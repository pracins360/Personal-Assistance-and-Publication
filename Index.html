<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple QR Business Card Maker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #222;
      color: #fff;
      padding: 10px 20px;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
    }
    main {
      display: flex;
      gap: 20px;
      padding: 20px;
      box-sizing: border-box;
    }
    .panel {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex: 1;
      box-sizing: border-box;
    }
    .panel h2 {
      margin-top: 0;
      font-size: 18px;
    }
    label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
    }
    input, select, button, textarea {
      width: 100%;
      padding: 6px;
      margin-top: 3px;
      box-sizing: border-box;
      font-size: 13px;
    }
    button {
      cursor: pointer;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    .qr-preview {
      margin-top: 10px;
      text-align: center;
    }
    #qrCanvasWrapper {
      display: inline-block;
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .card-preview-wrapper {
      text-align: center;
    }
    #cardCanvas {
      border: 1px solid #ccc;
      background: #eee;
    }
    .template-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .template-row button {
      flex: 1;
      font-size: 12px;
      padding: 6px;
    }
    small {
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
<header>
  <h1>Simple QR Business Card Maker (Landscape 1050×600)</h1>
</header>

<main>
  <!-- LEFT: DATA + QR -->
  <section class="panel">
    <h2>1. Person Data & QR</h2>

    <label>Full Name</label>
    <input id="fullName" type="text" placeholder="John Doe">

    <label>Initials (optional)</label>
    <input id="initials" type="text" placeholder="JD">

    <label>Phone (for WhatsApp & vCard)</label>
    <input id="phone" type="text" placeholder="+5999...">

    <label>Email</label>
    <input id="email" type="email" placeholder="name@example.com">

    <label>Company</label>
    <input id="company" type="text" placeholder="Company Name">

    <label>Website</label>
    <input id="website" type="text" placeholder="https://...">

    <label>Address</label>
    <textarea id="address" rows="2" placeholder="Street, City, Country"></textarea>

    <button id="btnWhatsAppQR">Generate WhatsApp QR</button>
    <button id="btnVCardQR">Generate vCard QR</button>

    <div class="qr-preview">
      <h3>QR Preview</h3>
      <div id="qrCanvasWrapper"></div>
      <button id="btnUseQROnCard">Use this QR on card</button>
    </div>
  </section>

  <!-- MIDDLE: TEMPLATE SETTINGS -->
  <section class="panel">
    <h2>2. Template Settings</h2>

    <label>Template Type</label>
    <select id="templateType">
      <option value="scenery">Scenery</option>
      <option value="solid">Solid Background</option>
    </select>

    <!-- Scenery text fields -->
    <div id="sceneryFields">
      <label>Title (top)</label>
      <input id="sceneryTitle" type="text" placeholder="Business Name">

      <label>Subtitle (middle)</label>
      <input id="scenerySubtitle" type="text" placeholder="Tagline or Role">

      <label>Footer Slogan (bottom)</label>
      <input id="sceneryFooter" type="text" placeholder="Slogan or Call to Action">
    </div>

    <!-- Solid text fields -->
    <div id="solidFields" style="display:none;">
      <label>Show on card</label>
      <select id="solidTextMode">
        <option value="name">Name only</option>
        <option value="initials">Initials only</option>
        <option value="both">Name + initials</option>
      </select>
    </div>

    <label>Solid Background Color (for solid template)</label>
    <input id="solidColor" type="color" value="#1a1a1a">

    <label>Scenery Background (sample)</label>
    <div class="template-row">
      <button type="button" data-scenery="beach" class="btnScenery">Beach</button>
      <button type="button" data-scenery="city" class="btnScenery">City</button>
      <button type="button" data-scenery="abstract" class="btnScenery">Abstract</button>
    </div>
    <small>You can later replace these with your own images in the code.</small>

    <button id="btnRenderCard">Render Card</button>
    <button id="btnDownloadCard">Download Card as PNG</button>
  </section>

  <!-- RIGHT: CARD PREVIEW -->
  <section class="panel card-preview-wrapper">
    <h2>3. Card Preview (1050×600)</h2>
    <canvas id="cardCanvas" width="1050" height="600"></canvas>
    <small>QR will be placed in the right area. You can adjust code later for exact layout.</small>
  </section>
</main>

<!-- QRCode.js (CDN). For offline, download this file and include locally. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
  // ===== BASIC STATE =====
  let currentQRCanvas = null;
  let currentScenery = 'beach'; // default
  const cardCanvas = document.getElementById('cardCanvas');
  const ctx = cardCanvas.getContext('2d');

  // ===== TEMPLATE TYPE TOGGLE =====
  const templateTypeSelect = document.getElementById('templateType');
  const sceneryFields = document.getElementById('sceneryFields');
  const solidFields = document.getElementById('solidFields');

  templateTypeSelect.addEventListener('change', () => {
    if (templateTypeSelect.value === 'scenery') {
      sceneryFields.style.display = 'block';
      solidFields.style.display = 'none';
    } else {
      sceneryFields.style.display = 'none';
      solidFields.style.display = 'block';
    }
  });

  // ===== SCENERY BUTTONS =====
  document.querySelectorAll('.btnScenery').forEach(btn => {
    btn.addEventListener('click', () => {
      currentScenery = btn.dataset.scenery;
    });
  });

  // ===== QR GENERATION =====
  const qrWrapper = document.getElementById('qrCanvasWrapper');

  function clearQR() {
    qrWrapper.innerHTML = '';
    currentQRCanvas = null;
  }

  function generateWhatsAppQR() {
    clearQR();
    const phone = document.getElementById('phone').value.trim();
    if (!phone) {
      alert('Please enter a phone number.');
      return;
    }
    const url = 'https://wa.me/' + phone.replace(/[^0-9]/g, '');
    const qr = new QRCode(qrWrapper, {
      text: url,
      width: 200,
      height: 200
    });
    setTimeout(() => {
      currentQRCanvas = qrWrapper.querySelector('canvas');
    }, 200);
  }

  function generateVCardQR() {
    clearQR();
    const name = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const company = document.getElementById('company').value.trim();
    const website = document.getElementById('website').value.trim();
    const address = document.getElementById('address').value.trim();

    if (!name || !phone) {
      alert('Please enter at least name and phone for vCard.');
      return;
    }

    const vcard =
      'BEGIN:VCARD\n' +
      'VERSION:3.0\n' +
      'FN:' + name + '\n' +
      (company ? 'ORG:' + company + '\n' : '') +
      'TEL;TYPE=CELL:' + phone + '\n' +
      (email ? 'EMAIL:' + email + '\n' : '') +
      (website ? 'URL:' + website + '\n' : '') +
      (address ? 'ADR;TYPE=WORK:;;' + address + '\n' : '') +
      'END:VCARD';

    const qr = new QRCode(qrWrapper, {
      text: vcard,
      width: 200,
      height: 200
    });
    setTimeout(() => {
      currentQRCanvas = qrWrapper.querySelector('canvas');
    }, 200);
  }

  document.getElementById('btnWhatsAppQR').addEventListener('click', generateWhatsAppQR);
  document.getElementById('btnVCardQR').addEventListener('click', generateVCardQR);

  // ===== USE QR ON CARD =====
  let qrImageForCard = null;

  document.getElementById('btnUseQROnCard').addEventListener('click', () => {
    if (!currentQRCanvas) {
      alert('Generate a QR first.');
      return;
    }
    qrImageForCard = new Image();
    qrImageForCard.src = currentQRCanvas.toDataURL('image/png');
    qrImageForCard.onload = () => {
      alert('QR is ready to be placed on the card. Click "Render Card".');
    };
  });

  // ===== RENDER CARD =====
  function drawSceneryBackground() {
    // Simple colored gradients as placeholders for scenery
    if (currentScenery === 'beach') {
      const grad = ctx.createLinearGradient(0, 0, 0, 600);
      grad.addColorStop(0, '#87CEEB'); // sky
      grad.addColorStop(0.5, '#87CEEB');
      grad.addColorStop(0.5, '#F4A460'); // sand
      grad.addColorStop(1, '#F4A460');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1050, 600);
    } else if (currentScenery === 'city') {
      const grad = ctx.createLinearGradient(0, 0, 1050, 600);
      grad.addColorStop(0, '#222');
      grad.addColorStop(1, '#555');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1050, 600);
    } else {
      // abstract
      const grad = ctx.createRadialGradient(525, 300, 50, 525, 300, 600);
      grad.addColorStop(0, '#ff7f50');
      grad.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1050, 600);
    }
  }

  function drawSceneryText() {
    const title = document.getElementById('sceneryTitle').value.trim();
    const subtitle = document.getElementById('scenerySubtitle').value.trim();
    const footer = document.getElementById('sceneryFooter').value.trim();

    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';

    if (title) {
      ctx.font = 'bold 40px Arial';
      ctx.fillText(title, 40, 80);
    }
    if (subtitle) {
      ctx.font = '24px Arial';
      ctx.fillText(subtitle, 40, 130);
    }
    if (footer) {
      ctx.font = '20px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(footer, 525, 560);
    }
  }

  function drawSolidBackground() {
    const color = document.getElementById('solidColor').value || '#1a1a1a';
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 1050, 600);
  }

  function drawSolidText() {
    const mode = document.getElementById('solidTextMode').value;
    const name = document.getElementById('fullName').value.trim();
    const initials = document.getElementById('initials').value.trim();

    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';

    if (mode === 'name' && name) {
      ctx.font = 'bold 42px Arial';
      ctx.fillText(name, 40, 100);
    } else if (mode === 'initials' && initials) {
      ctx.font = 'bold 80px Arial';
      ctx.fillText(initials, 40, 140);
    } else if (mode === 'both') {
      if (initials) {
        ctx.font = 'bold 80px Arial';
        ctx.fillText(initials, 40, 140);
      }
      if (name) {
        ctx.font = '24px Arial';
        ctx.fillText(name, 40, 190);
      }
    }
  }

  function drawQROnCard() {
    if (!qrImageForCard) return;
    // Place QR on right side
    const qrSize = 220;
    const x = 1050 - qrSize - 40;
    const y = (600 - qrSize) / 2;
    ctx.drawImage(qrImageForCard, x, y, qrSize, qrSize);
  }

  function renderCard() {
    // Clear canvas
    ctx.clearRect(0, 0, 1050, 600);

    if (templateTypeSelect.value === 'scenery') {
      drawSceneryBackground();
      drawSceneryText();
    } else {
      drawSolidBackground();
      drawSolidText();
    }

    drawQROnCard();
  }

  document.getElementById('btnRenderCard').addEventListener('click', renderCard);

  // ===== DOWNLOAD CARD =====
  document.getElementById('btnDownloadCard').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'business-card.png';
    link.href = cardCanvas.toDataURL('image/png');
    link.click();
  });

  // Initial render (blank)
  renderCard();
</script>
</body>
</html>
